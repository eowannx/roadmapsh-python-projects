{% extends 'base.html' %}
{% block content %}
    <h1>Articles</h1>
    {% for article in articles %}
        <div class="article-card">
            <h2><a href="/article/{{ article.id }}">{{ article.title }}</a></h2>
            <p class="article-date">{{ article.date }}</p>
            <p class="article-preview">{{ article.content[:120] }}...</p>
        </div>
    {% endfor %}
{% endblock %}
