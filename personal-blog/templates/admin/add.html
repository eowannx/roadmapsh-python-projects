{% extends 'base.html' %}
{% block content %}
    <h1>Add Article</h1>
    <form method="POST">
        <div class="form-group">
            <input type="text" name="title" placeholder="Title" required>
        </div>
        <div class="form-group">
            <textarea name="content" placeholder="Content" required></textarea>
        </div>
        <button type="submit">Publish</button>
    </form>
{% endblock %}
