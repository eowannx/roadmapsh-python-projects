{% extends 'base.html' %}
{% block content %}
    <h1>Edit Article</h1>
    <form method="POST">
        <div class="form-group">
            <input type="text" name="title" value="{{ article.title }}" required>
        </div>
        <div class="form-group">
            <textarea name="content" required>{{ article.content }}</textarea>
        </div>
        <button type="submit">Save</button>
    </form>
{% endblock %}
